<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mobile images</title>
    <style>
  img {
    margin: 10px;
    cursor: pointer;
  }
</style>



    <script>
        function showMessage(Model) {
            alert("you clicked on " + Model);
        }
    </script>


</head>
<body>
<!--     
    2. Display some Mobile images in browser. On click on an
image Show the message in alert to user. -->

<h2>Mobile gallery</h2>
<img src="download (1).jpg" onclick="showMessage('iphone')" alt="iphone">

<img src="download (2).jpg" onclick="showMessage('samsung')" alt="samsung">

<img src="download.jpg" onclick="showMessage('oneplus')" alt="oneplus">

  
</body>
</html>
