<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert on link click</title>

    <script>
   function showAlert(){
    alert("link clicked!");
   }
  </script>

</head>
<body>
    <!-- 1. Show an alert box on click on a link. -->
    <a href="#" onclick="showAlert()">Click me</a>

                   or
    <a href="#" onclick="alert('Link clicked!')">Click me</a>
</body>
</html>
